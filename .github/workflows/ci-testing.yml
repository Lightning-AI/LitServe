name: CI testing

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: [main, "release/*"]
  pull_request:
    branches: [main, "release/*"]
  schedule:
    - cron: "0 0 * * *" # every day at midnight UTC

defaults:
  run:
    shell: bash

jobs:
  pytester:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Runner images: https://github.com/actions/runner-images
        os: ["ubuntu-24.04", "macos-15", "windows-2025"]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          - { os: "ubuntu-22.04", python-version: "3.10", requires: "oldest" }

    timeout-minutes: 35
    env:
      TORCH_URL: "https://download.pytorch.org/whl/cpu/torch_stable.html"
      UV_EXCLUDE_NEWER: "2 days"
      UV_TORCH_BACKEND: "cpu"

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install uv and setup python
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          activate-environment: true
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Set up dependencies
        run: |
          uv pip compile pyproject.toml -o requirements.txt
          cat requirements.txt

      - name: Set min. dependencies
        if: matrix.requires == 'oldest'
        run: |
          uv pip install 'lightning-utilities[cli]>=0.15.1'
          uv run python -m lightning_utilities.cli requirements set-oldest --req_files=pyproject.toml

      - name: Install package
        run: |
          uv pip list
          uv sync --all-extras --dev
          uv pip list

      - name: Tests
        timeout-minutes: 15
        run: pytest --cov=litserve tests/ -v -s --durations=100

      - name: Statistics
        run: |
          coverage report
          coverage xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.xml
          flags: unittests
          env_vars: OS,PYTHON
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Minimize uv cache
        run: uv cache prune --ci

  tests-guardian:
    runs-on: ubuntu-latest
    needs: pytester
    if: always()
    steps:
      - run: echo "${{ needs.pytester.result }}"
      - name: failing...
        if: needs.pytester.result == 'failure'
        run: exit 1
      - name: cancelled or skipped...
        if: contains(fromJSON('["cancelled", "skipped"]'), needs.pytester.result)
        timeout-minutes: 1
        run: sleep 90
